<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Tiếng Anh - Từ vựng của tôi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fdfbf7 0%, #fff0f0 50%, #f0f7ff 100%);
        }
        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .active-menu {
            background-color: #cce5ff;
            color: #1e3a8a;
        }
    </style>
</head>

<body class="h-screen flex flex-col text-gray-800 overflow-hidden bg-gradient-to-br from-[#fdfbf7] via-[#fff0f0] to-[#f0f7ff]">
    <header class="flex items-center justify-between px-6 py-3 bg-white/60 backdrop-blur-md shadow-sm z-10 relative border-b border-pink-50/50">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#ffb3c6] rounded-full flex items-center justify-center text-white shadow-sm">
                    <i class="fa-solid fa-heart text-[15px]"></i>
                </div>
                <div class="text-2xl font-extrabold text-[#ff6b81] tracking-tight">goctienganh</div>
            </div>
            
            
        </div>
        
        <div class="flex items-center gap-3">
            <div class="flex items-center bg-white px-3 py-1.5 rounded-full text-[15px] font-bold text-[#f87171] shadow-sm">
                <i class="fa-solid fa-fire mr-1.5"></i> 1
            </div>
            <button class="w-9 h-9 rounded-full bg-white flex items-center justify-center text-[#475569] shadow-sm hover:bg-[#fff0f3] hover:text-white transition-colors">
                <i class="fa-regular fa-bell text-[17px]"></i>
            </button>
            <button class="bg-[#ff9eb5] hover:bg-[#ff6b81] transition-colors text-white px-4 py-1.5 rounded-full text-[15px] font-bold flex items-center shadow-sm">
                <i class="fa-solid fa-star text-[#fde047] mr-1.5 text-xs"></i> PRO
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside id="sidebar" class="w-[240px] flex flex-col justify-between bg-white/60 backdrop-blur-md border-r border-[#ffe4e6] z-10 transition-all duration-300 shrink-0">
            <div class="p-4 flex flex-col gap-2 overflow-y-auto hide-scrollbar">
                <a href="index.html" class="flex items-center gap-3 p-3 rounded-full font-bold text-gray-500 hover:bg-[#ffe4e6] hover:text-white transition-colors">
                    <div class="w-9 flex justify-center text-lg shrink-0"><i class="fa-solid fa-house"></i></div>
                    <span class="link-text">Trang chủ</span>
                </a>
                <a href="vocab-sets.html" class="flex items-center gap-3 p-3 rounded-full font-bold text-gray-500 hover:bg-[#ffe4e6] hover:text-white transition-colors">
                    <div class="w-9 flex justify-center text-lg shrink-0"><i class="fa-solid fa-folder"></i></div>
                    <span class="link-text">Tài liệu</span>
                </a>
                <a href="vocab.html" class="flex items-center gap-3 p-3 rounded-full font-bold text-gray-500 hover:bg-[#ffe4e6] hover:text-white transition-colors">
                    <div class="w-9 flex justify-center text-lg shrink-0"><i class="fa-solid fa-language"></i></div>
                    <span class="link-text">Ngôn ngữ</span>
                </a>
                <a href="exams.html" class="flex items-center gap-3 p-3 rounded-full font-bold text-gray-500 hover:bg-[#ffe4e6] hover:text-white transition-colors">
                    <div class="w-9 flex justify-center text-lg shrink-0"><i class="fa-solid fa-clipboard-list"></i></div>
                    <span class="link-text">Luyện đề</span>
                </a>
                <a href="grammar.html" class="flex items-center gap-3 p-3 rounded-full font-bold text-gray-500 hover:bg-[#ffe4e6] hover:text-white transition-colors">
                    <div class="w-9 flex justify-center text-lg shrink-0"><i class="fa-solid fa-book-open"></i></div>
                    <span class="link-text">Ngữ pháp</span>
                </a>
                <a href="game.html" class="flex items-center gap-3 p-3 rounded-full font-bold text-gray-500 hover:bg-[#ffe4e6] hover:text-white transition-colors">
                    <div class="w-9 flex justify-center text-lg shrink-0"><i class="fa-solid fa-gamepad"></i></div>
                    <span class="link-text">Game phản xạ</span>
                </a>
                <a href="skills.html" class="flex items-center gap-3 p-3 rounded-full font-bold text-gray-500 hover:bg-[#ffe4e6] hover:text-white transition-colors">
                    <div class="w-9 flex justify-center text-lg shrink-0"><i class="fa-solid fa-headphones-simple"></i></div>
                    <span class="link-text">4 Skills</span>
                </a>
            </div>

            <div class="mt-auto flex flex-col">
                <div class="px-4 pb-3">
                    <button id="btn-toggle-sidebar" class="w-full bg-[#ffe4e6] hover:bg-[#ffb3c6] text-[#ff6b81] hover:text-white font-bold py-2 rounded-xl transition-colors shadow-sm">
                        <i id="sidebar-icon" class="fa-solid fa-angles-left"></i>
                    </button>
                </div>
                <div id="auth-container" class="bg-[#fff0f3] p-4 flex items-center justify-between cursor-pointer hover:bg-[#ff9eb5] group transition-colors profile-box rounded-xl mx-4 mb-2">
                    <div id="login-view" class="w-full flex items-center justify-center gap-2 text-[#ff6b81] group-hover:text-white font-bold transition-colors" onclick="signInWithGoogle()">
                        <i class="fa-brands fa-google text-lg"></i>
                        <span>Đăng nhập Google</span>
                    </div>

                    <div id="user-view" class="w-full flex items-center justify-between hidden">
                        <div class="flex items-center gap-3">
                            <img id="user-avatar" src="" alt="Avatar" class="w-10 h-10 rounded-full border-2 border-white shadow-sm shrink-0">
                            <div class="leading-tight profile-info">
                                <div id="user-name" class="font-bold text-[#2d3748] text-[15px]">Tên người dùng</div>
                                <div class="text-[11px] text-[#475569] font-semibold mt-0.5 hover:text-red-500" onclick="signOutUser()">Đăng xuất</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-[#ffe4e6] p-3 flex justify-between items-center text-sm font-bold text-[#ff6b81] footer-info rounded-b-xl mx-4 mb-4">
                    <div class="flex items-center gap-2 bg-white/80 px-3 py-1 rounded-full shadow-sm">
                        <div class="w-4 h-4 rounded-full border border-[#ff6b81] flex items-center justify-center">
                            <i class="fa-solid fa-c text-[9px] text-[#ff6b81]"></i>
                        </div>
                        <span class="text-[#ff6b81]">130</span>
                    </div>
                    <div id="btn-darkmode" class="flex items-center gap-1.5 cursor-pointer hover:opacity-80 text-[#ff6b81]">
                        <i id="mode-icon" class="fa-regular fa-moon"></i> <span id="mode-text">Tối</span>
                    </div>
                </div>
            </div>

            <script>
                (function() {
                    let currentPath = window.location.pathname.split('/').pop();
                    if (currentPath === '') currentPath = 'index.html';
                    
                    const links = document.querySelectorAll('#sidebar .overflow-y-auto a');
                    links.forEach(link => {
                        const href = link.getAttribute('href');
                        // Nếu trang hiện tại khớp với href (hoặc grammar-history thì active mục grammar)
                        if (href === currentPath || (currentPath === 'grammar-history.html' && href === 'grammar.html')) {
                            link.className = "flex items-center gap-3 bg-gradient-to-r from-[#ffb3c6] to-[#ffe5ec] p-3 rounded-full font-bold text-white shadow-sm transition-transform hover:scale-[1.02]";
                        } else {
                            link.className = "flex items-center gap-3 p-3 rounded-full font-bold text-gray-500 hover:bg-[#ffe4e6] hover:text-white transition-colors";
                        }
                    });
                })();
            </script>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 md:p-8">
            <div class="max-w-6xl mx-auto">
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white rounded-2xl p-4 border-2 border-blue-100 flex items-center gap-4 shadow-sm">
                        <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500 text-xl border border-blue-200">
                            <i class="fa-solid fa-mobile-screen"></i>
                        </div>
                        <div>
                            <div class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Tổng</div>
                            <div id="stat-total-vocab" class="text-2xl font-extrabold text-gray-800">0</div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-4 border-2 border-green-100 flex items-center gap-4 shadow-sm">
                        <div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center text-green-500 text-xl border border-green-200">
                            <i class="fa-solid fa-check-double"></i>
                        </div>
                        <div>
                            <div class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Thuộc (Cấp 1-8)</div>
                            <div id="stat-learned-vocab" class="text-2xl font-extrabold text-gray-800">0</div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-4 border-2 border-orange-100 flex items-center gap-4 shadow-sm">
                        <div class="w-12 h-12 rounded-xl bg-orange-50 flex items-center justify-center text-orange-500 text-xl border border-orange-200">
                            <i class="fa-regular fa-circle-pause"></i>
                        </div>
                        <div>
                            <div class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Chưa (Cấp 0)</div>
                            <div id="stat-unlearned-vocab" class="text-2xl font-extrabold text-gray-800">0</div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-2xl p-4 border-2 border-pink-100 flex items-center gap-4 shadow-sm">
                        <div class="w-12 h-12 rounded-xl bg-pink-50 flex items-center justify-center text-pink-500 text-xl border border-pink-200">
                            <i class="fa-solid fa-percent"></i>
                        </div>
                        <div>
                            <div class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Tỷ lệ thuộc</div>
                            <div id="stat-percent-vocab" class="text-2xl font-extrabold text-gray-800">0%</div>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-4 mb-6">
                    <div class="flex-1 flex gap-2">
                        <div class="relative flex-1">
                            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="search-all-vocab" placeholder="Tìm từ..." class="w-full pl-11 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-300 font-semibold text-sm shadow-sm" onkeyup="filterAllVocabList()">
                        </div>
                        <select id="filter-srs-level" class="px-4 py-2 bg-white border border-gray-200 rounded-xl font-bold text-sm text-gray-700 outline-none shadow-sm" onchange="filterAllVocabList()">
                            <option value="all">Tất cả</option>
                            <option value="0">Chưa thuộc (Cấp 0)</option>
                            <option value="1">Thuộc (Cấp 1)</option>
                            <option value="2">Thuộc (Cấp 2)</option>
                            <option value="3">Thuộc (Cấp 3)</option>
                            <option value="4">Thuộc (Cấp 4)</option>
                            <option value="5">Thuộc (Cấp 5)</option>
                            <option value="6">Thuộc (Cấp 6)</option>
                            <option value="7">Thuộc (Cấp 7)</option>
                            <option value="8">Thuộc (Cấp 8)</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button class="bg-[#22c55e] hover:bg-green-600 text-white px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 shadow-md transition-all">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> Thêm từ với AI
                        </button>
                        <button onclick="window.location.href='vocab-sets.html'" class="bg-white hover:bg-gray-50 text-gray-800 border border-gray-200 px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 shadow-sm transition-all">
                            <i class="fa-solid fa-plus"></i> Đến Bộ Từ
                        </button>
                    </div>
                </div>

                <div class="bg-white border-2 border-[#ffe4e6] rounded-[32px] overflow-x-auto shadow-sm">
                    <table class="w-full text-left border-collapse min-w-[900px]">
                        <thead>
                            <tr class="bg-[#f0f7ff] border-b border-[#ffe4e6]">
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#2d3748] uppercase tracking-wider w-[15%]">Thuật ngữ</th>
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#2d3748] uppercase tracking-wider w-[20%]">Định nghĩa</th>
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#2d3748] uppercase tracking-wider w-[10%]">Phát âm</th>
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#2d3748] uppercase tracking-wider w-[10%]">Loại từ</th>
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#2d3748] uppercase tracking-wider w-[18%]">Ví dụ</th>
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#2d3748] uppercase tracking-wider w-[15%]">Từ đồng nghĩa</th>
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#2d3748] uppercase tracking-wider w-[12%] text-center">Mức độ</th>
                            </tr>
                        </thead>
                        <tbody id="all-vocab-list">
                            </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>
    <!-- Nhúng Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
