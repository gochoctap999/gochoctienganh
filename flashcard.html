<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn từ vựng cá nhân - Flashcard</title>
    <style>
        /* === MÃ CSS ĐỊNH DẠNG TỪ NGUỒN CUNG CẤP === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f8ff; /* Nền trắng pha xanh pastel */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #4a6572;
        }

        .app-container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        /* --- THANH TRẠNG THÁI TRÊN CÙNG --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 12px 25px;
            background: #ffffff;
            border-radius: 40px;
            border: 2px solid #c2e9fb;
            box-shadow: 0 4px 15px rgba(161, 196, 253, 0.15);
        }

        .progress { font-weight: bold; font-size: 16px; color: #5b8a72; }
        .top-actions { display: flex; gap: 20px; font-size: 14px; font-weight: 600; color: #7da0b1; align-items: center; }
        .action-btn, .toggle { cursor: pointer; transition: color 0.2s; text-decoration: none; color: inherit; }
        .action-btn:hover, .toggle:hover { color: #a8e6cf; }

        /* --- FLASHCARD 3D LẬT 2 MẶT --- */
        .flashcard-container {
            width: 100%;
            height: 380px;
            perspective: 1000px; /* Tạo góc nhìn 3D */
            cursor: pointer;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d; /* Giữ không gian 3D khi lật */
        }

        /* Lớp này sẽ được thêm bằng JS khi click */
        .flashcard-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Ẩn mặt sau khi nó bị lật úp */
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-shadow: 0 12px 25px rgba(168, 230, 207, 0.4);
            color: white;
        }

        /* Mặt trước - Xanh dương Pastel */
        .flashcard-front {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        }

        /* Mặt sau - Xanh lá Pastel tới Xanh dương (xoay 180 độ sẵn) */
        .flashcard-back {
            background: linear-gradient(135deg, #a8e6cf 0%, #a1c4fd 100%);
            transform: rotateY(180deg);
        }

        .flashcard-face:hover {
            box-shadow: 0 15px 30px rgba(168, 230, 207, 0.5);
        }

        /* Chi tiết chữ trên thẻ */
        .card-label {
            position: absolute;
            top: 25px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.8;
        }

        .card-word { font-size: 55px; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); margin-top: -20px; }
        .card-type { font-size: 15px; font-weight: bold; letter-spacing: 2px; margin-top: 15px; opacity: 0.9; text-transform: uppercase; }
        .card-pronunciation { font-size: 18px; font-style: italic; margin-top: 5px; opacity: 0.8; }

        .card-meaning { font-size: 45px; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); margin-bottom: 20px; }

        /* Khung ví dụ có loa */
        .card-example-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.25);
            padding: 12px 25px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            max-width: 90%;
        }
        .speaker-icon { font-size: 20px; margin-right: 12px; cursor: pointer; }
        .card-example { font-size: 18px; font-style: italic; }

        .card-hint {
            position: absolute;
            bottom: 25px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.25);
            padding: 8px 20px;
            border-radius: 30px;
        }

        /* --- CÁC NÚT ĐIỀU KHIỂN --- */
        .bottom-controls { display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%; margin-top: 5px; }
        .bottom-controls button {
            padding: 12px 25px; border-radius: 40px; border: none; cursor: pointer; font-weight: bold; font-size: 15px; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .btn-nav { background: transparent; color: #7da0b1; }
        .btn-nav:hover { background: #e6f2f7; }
        .btn-icon { width: 45px; height: 45px; border-radius: 50% !important; background: #c2e9fb; color: #4a6572; justify-content: center; padding: 0 !important; }
        .btn-icon:hover { background: #a1c4fd; }
        .btn-quen { background: #c2e9fb; color: #4a758a; } 
        .btn-thuoc { background: #a8e6cf; color: #3b7059; } 
        .btn-action:hover { filter: brightness(0.95); transform: translateY(-2px); }
        .btn-action:active { transform: translateY(0); }
    </style>
</head>
<body>
    <!-- CẤU TRÚC HTML -->
    <div class="app-container">
        <div class="top-bar">
            <div class="progress" id="progress-text">1 / 5</div>
            <div class="top-actions">
                <span class="toggle">EN ⇄ VN</span>
                <span class="action-btn" onclick="resetGame()">↺ Chơi lại</span>
                <!-- Nút Thoát đã được gắn liên kết về trang Game -->
                <a href="game.html" class="action-btn">Thoát</a>
            </div>
        </div>

        <div class="flashcard-container" onclick="flipCard()">
            <div class="flashcard-inner" id="flashcard-inner">
                
                <div class="flashcard-face flashcard-front">
                    <p class="card-label">TỪ TIẾNG ANH</p>
                    <h1 class="card-word" id="en-word">strengthen</h1>
                    <p class="card-type" id="en-type">VERB</p>
                    <p class="card-pronunciation" id="en-pronunciation">/'stren.θən/</p>
                    <p class="card-hint">👆 Nhấn Space hoặc click để lật</p>
                </div>

                <div class="flashcard-face flashcard-back">
                    <p class="card-label">NGHĨA TIẾNG VIỆT</p>
                    <h1 class="card-meaning" id="vn-meaning">làm cho mạnh mẽ hơn</h1>
                    <div class="card-example-box" id="example-box">
                        <span class="speaker-icon">🔊</span>
                        <p class="card-example" id="vn-example">Ví dụ: "Exercise will help strengthen your body muscles"</p>
                    </div>
                    <p class="card-hint">👆 Nhấn Space hoặc click để lật</p>
                </div>

            </div>
        </div>

        <div class="bottom-controls">
            <button class="btn-nav" onclick="prevWord()">&#10094; Trước</button>
            <button class="btn-icon">🔊</button>
            <button class="btn-action btn-quen" onclick="nextWord()">&#10005; Quên</button>
            <button class="btn-action btn-thuoc" onclick="nextWord()">&#10003; Thuộc</button>
            <button class="btn-nav" onclick="nextWord()">Tiếp &#10095;</button>
        </div>
    </div>

    <!-- MÃ JAVASCRIPT XỬ LÝ LÔ-GIC THẺ -->
    <script>
        // Danh sách từ vựng
        const vocab = [
            { word: "strengthen", type: "VERB", pronunciation: "/'stren.θən/", meaning: "Làm cho mạnh mẽ hơn", example: "Exercise will help strengthen your body muscles" },
            { word: "promotion", type: "NOUN", pronunciation: "/prə'moʊ.ʃən/", meaning: "Sự thăng tiến", example: "He worked hard to get a promotion." },
            { word: "resign", type: "VERB", pronunciation: "/rɪ'zaɪn/", meaning: "Từ chức", example: "The manager decided to resign last week." },
            { word: "freight", type: "NOUN", pronunciation: "/freɪt/", meaning: "Hàng hóa (vận chuyển)", example: "The ship was carrying a cargo of freight." },
            { word: "customs", type: "NOUN", pronunciation: "/'kʌs.təmz/", meaning: "Hải quan", example: "It took hours to get through customs." }
        ];

        let currentIndex = 0;
        let isFlipped = false; // Trạng thái lật của thẻ

        const flashcardInner = document.getElementById("flashcard-inner");
        const progressText = document.getElementById("progress-text");

        // Mặt trước
        const enWord = document.getElementById("en-word");
        const enType = document.getElementById("en-type");
        const enPronunciation = document.getElementById("en-pronunciation");

        // Mặt sau
        const vnMeaning = document.getElementById("vn-meaning");
        const vnExample = document.getElementById("vn-example");
        const exampleBox = document.getElementById("example-box");

        // Hàm cập nhật nội dung văn bản
        function updateUI() {
            progressText.innerText = `${currentIndex + 1} / ${vocab.length}`;
            
            // Cập nhật mặt tiếng Anh
            enWord.innerText = vocab[currentIndex].word;
            enType.innerText = vocab[currentIndex].type;
            enPronunciation.innerText = vocab[currentIndex].pronunciation;
            
            // Cập nhật mặt tiếng Việt
            vnMeaning.innerText = vocab[currentIndex].meaning;
            
            if (vocab[currentIndex].example) {
                vnExample.innerText = `Ví dụ: "${vocab[currentIndex].example}"`;
                exampleBox.style.display = "flex";
            } else {
                exampleBox.style.display = "none";
            }

            // Mỗi khi đổi từ, đảm bảo thẻ quay về mặt trước (mặt tiếng Anh)
            if (isFlipped) {
                flashcardInner.classList.remove("is-flipped");
                isFlipped = false;
            }
        }

        // Xử lý hiệu ứng lật thẻ
        function flipCard() {
            isFlipped = !isFlipped;
            if (isFlipped) {
                flashcardInner.classList.add("is-flipped");
            } else {
                flashcardInner.classList.remove("is-flipped");
            }
        }

        // Chuyển sang từ tiếp theo
        function nextWord() {
            currentIndex = (currentIndex + 1) % vocab.length;
            updateUI();
        }

        // Quay lại từ trước đó
        function prevWord() {
            currentIndex = (currentIndex - 1 + vocab.length) % vocab.length;
            updateUI();
        }

        // Đặt lại trò chơi
        function resetGame() {
            currentIndex = 0;
            updateUI();
        }

        // Lắng nghe phím tắt
        document.addEventListener("keydown", function(event) {
            if (event.code === "Space") {
                event.preventDefault(); // Tránh cuộn trang
                flipCard();
            } else if (event.code === "ArrowRight") {
                nextWord();
            } else if (event.code === "ArrowLeft") {
                prevWord();
            }
        });

        // Khởi tạo hiển thị từ đầu tiên
        updateUI();
    </script>
</body>
</html>
