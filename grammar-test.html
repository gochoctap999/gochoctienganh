<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Tiếng Anh - Làm bài</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-[#fdfbf7] via-[#fff0f0] to-[#f0f7ff] text-gray-800 font-[Nunito]">
    <header class="flex items-center justify-between px-6 py-3 bg-white shadow-sm sticky top-0 z-50">
        <button onclick="handleExit()" class="font-bold text-[#475569] hover:text-[#ff6b81] transition-colors"><i class="fa-solid fa-arrow-left mr-1"></i> Thoát</button>
        <div id="test-progress" class="font-extrabold text-[#ff6b81] bg-[#fff0f3] px-4 py-1.5 rounded-full text-sm border border-[#ffe4e6]">0/0 Đã làm</div>
        <button id="submit-test-btn" onclick="submitTest()" class="bg-[#ff9eb5] text-white px-6 py-1.5 rounded-full font-bold shadow-[0_4px_12px_rgba(255,158,181,0.4)] hover:bg-[#ff6b81] transition-all transform hover:scale-105">Nộp bài</button>
    </header>
    <main class="flex-1 overflow-y-auto w-full">
        <div class="max-w-6xl mx-auto p-4 md:p-6 pb-20 flex flex-col lg:flex-row gap-8 items-start justify-center transition-all duration-300">
            
            <div id="left-panel" class="w-full max-w-4xl mx-auto transition-all duration-300">
                <div id="result-container" class="hidden bg-[#fff0f3] rounded-[32px] p-6 md:p-10 mb-8 shadow-sm border-2 border-[#ffe4e6] text-center relative overflow-hidden">
                    <h2 class="text-3xl font-extrabold text-[#2d3748] mb-2">Kết quả của bạn!</h2>
                    <div class="text-6xl font-extrabold text-white drop-shadow-md my-4" id="res-score">0/0</div>
                    <p id="res-text" class="font-bold text-[#4f46e5] mb-6">Bạn đã trả lời đúng...</p>
                    <div class="flex justify-center gap-4 text-sm font-bold">
                        <div class="bg-white px-5 py-2.5 rounded-xl text-green-500 shadow-sm" id="stat-correct">Đúng: 0</div>
                        <div class="bg-white px-5 py-2.5 rounded-xl text-red-400 shadow-sm" id="stat-incorrect">Sai: 0</div>
                        <div class="bg-white px-5 py-2.5 rounded-xl text-gray-400 shadow-sm" id="stat-unanswered">Trống: 0</div>
                    </div>
                </div>

                <div id="filter-container" class="hidden justify-end mb-4 px-4">
                    <div class="relative custom-dropdown-container">
                        <button onclick="toggleDropdown(event, 'filter-dropdown')" class="bg-[#ffb3c6] text-white px-6 py-2 rounded-xl font-bold shadow-sm hover:bg-[#ff8fa3] flex items-center">
                            <span id="current-filter">Tất cả</span> 
                            <i class="fa-solid fa-chevron-down ml-2"></i>
                        </button>
                        <div id="filter-dropdown" class="dropdown-menu absolute right-0 top-full mt-2 w-40 bg-white rounded-2xl shadow-[0_10px_25px_rgba(0,0,0,0.1)] border border-pink-50 py-2 z-[999] hidden flex-col">
                            <div onclick="applyFilter('all', 'Tất cả')" class="dropdown-item px-5 py-2.5 hover:bg-pink-50 cursor-pointer text-gray-700 font-bold">Tất cả</div>
                            <div onclick="applyFilter('correct', 'Đúng')" class="dropdown-item px-5 py-2.5 hover:bg-pink-50 cursor-pointer text-green-500 font-bold">Đúng</div>
                            <div onclick="applyFilter('incorrect', 'Sai')" class="dropdown-item px-5 py-2.5 hover:bg-pink-50 cursor-pointer text-red-400 font-bold">Sai</div>
                            <div onclick="applyFilter('unanswered', 'Trống')" class="dropdown-item px-5 py-2.5 hover:bg-pink-50 cursor-pointer text-gray-400 font-bold">Trống</div>
                        </div>
                    </div>
                </div>

                <div class="bg-[#fdfafb] rounded-3xl p-6 shadow-sm border border-[#fce7f3]" id="main-content-wrapper">
                    <div id="question-list" class="space-y-6"></div>
                </div>
            </div>

            <div id="right-panel" class="w-full lg:w-[320px] shrink-0 sticky top-4 order-first lg:order-last mb-6 lg:mb-0 transition-all duration-300">
                <div class="bg-white rounded-[24px] p-5 shadow-sm border border-[#ffe4e6]">
                    <h4 class="text-[12px] font-extrabold text-[#ffb3c6] mb-4 uppercase tracking-wider border-b border-[#ffe4e6] pb-3">
                        <i class="fa-solid fa-list-ol mr-1"></i> Danh sách câu hỏi
                    </h4>
                    <div id="q-nav-grid" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

        </div>
    </main>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="script.js"></script>
    <script>window.onload = initTest;</script>
</body>
</html>
