<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Tiếng Anh - Lịch sử Luyện đề</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#fdfafb] font-[Nunito] min-h-screen">

    <main class="max-w-5xl mx-auto p-6 md:p-10">
        <div class="mb-8">
            <button onclick="window.location.href='exams.html'" class="font-bold text-gray-500 hover:text-[#ff6b81] transition-all">
                <i class="fa-solid fa-arrow-left mr-2"></i> Quay lại Kho luyện đề
            </button>
        </div>

        <div class="mb-8">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-2xl bg-[#ffb3c6] flex items-center justify-center text-white text-2xl shadow-lg shadow-pink-200">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </div>
                <div>
                    <h2 class="font-extrabold text-[#2d3748] text-3xl">Lịch sử Luyện đề</h2>
                    <p class="text-gray-500 font-bold">Xem lại các đề thi bạn đã hoàn thành.</p>
                </div>
            </div>
        </div>

        <div class="bg-white/80 backdrop-blur-md border border-[#ffe4e6] rounded-[32px] p-6 md:p-8 shadow-sm">
            <div id="exam-history-list" class="flex flex-col gap-4">
                <p class="text-center text-gray-400 font-bold py-10">Đang tải lịch sử làm bài...</p>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
    <script>
        // Gọi hàm load lịch sử thi khi trang tải xong
        window.onload = () => {
            if (typeof loadExamHistory === 'function') {
                loadExamHistory();
            }
        };
    </script>
</body>
</html>
