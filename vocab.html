<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Tiếng Anh - Từ vựng của tôi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fdfbf7 0%, #fff0f0 50%, #f0f7ff 100%);
        }
        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .active-menu {
            background-color: #cce5ff;
            color: #1e3a8a;
        }
    </style>
</head>
<body class="h-screen flex flex-col text-gray-800 overflow-hidden">

    <header class="flex items-center justify-between px-6 py-3 bg-[#bde0fe] shadow-sm z-10 relative">
        <div class="flex items-center gap-8">
            <div class="text-2xl font-extrabold text-[#1e3a8a] tracking-tight">goctienganh</div>
            <div class="hidden md:flex relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                <input type="text" placeholder="Tìm từ vựng, bộ thẻ..." class="pl-10 pr-4 py-2 w-64 md:w-80 rounded-full bg-white/80 border border-[#bde0fe] outline-none focus:border-blue-400 text-sm shadow-sm transition-colors">
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="flex items-center bg-[#eef2f6] px-3 py-1.5 rounded-full text-[15px] font-bold text-[#f87171] shadow-sm">
                <i class="fa-solid fa-fire mr-1.5"></i> 1
            </div>
            <button class="w-9 h-9 rounded-full bg-[#eef2f6] flex items-center justify-center text-[#475569] shadow-sm hover:bg-white transition-colors">
                <i class="fa-regular fa-bell text-[17px]"></i>
            </button>
            <button class="bg-[#3b82f6] hover:bg-blue-600 transition-colors text-white px-4 py-1.5 rounded-full text-[15px] font-bold flex items-center shadow-sm">
                <i class="fa-solid fa-star text-[#fde047] mr-1.5 text-xs"></i> PRO
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside class="w-[240px] flex flex-col justify-between bg-white/40 backdrop-blur-md border-r border-[#e2e8f0] z-10">
            <div class="p-4 flex flex-col gap-2 overflow-y-auto">
                <a href="index.html" class="flex items-center gap-3 p-3 rounded-2xl font-bold text-gray-700 hover:bg-white/60 transition-colors">
                    <div class="text-[#475569] w-9 flex justify-center text-lg shrink-0"><i class="fa-solid fa-house"></i></div>
                    <span class="link-text">Trang chủ</span>
                </a>
                <a href="vocab-sets.html" class="flex items-center gap-3 p-3 rounded-2xl font-bold text-gray-700 hover:bg-white/60 transition-colors">
                    <div class="text-[#475569] w-9 flex justify-center text-lg shrink-0"><i class="fa-solid fa-border-all"></i></div>
                    <span class="link-text">Bộ từ vựng</span>
                </a>
                <!-- Từ vựng (Đang Active) -->
                <a href="vocab.html" class="flex items-center gap-3 active-menu p-3 rounded-2xl font-bold shadow-sm">
                    <div class="bg-[#ffb3c6] w-9 h-9 flex items-center justify-center rounded-xl text-red-500 shadow-inner shrink-0">
                        <i class="fa-solid fa-book"></i>
                    </div>
                    <span class="link-text">Từ vựng</span>
                </a>
                <a href="game.html" class="flex items-center gap-3 p-3 rounded-2xl font-bold text-gray-700 hover:bg-white/60 transition-colors">
                    <div class="text-[#475569] w-9 flex justify-center text-lg shrink-0"><i class="fa-solid fa-play"></i></div>
                    <span class="link-text">Game phản xạ</span>
                </a>
                </a>
                <!-- 4 Skill -->
                <a href="skills.html" class="flex items-center gap-3 p-3 rounded-2xl font-bold text-gray-700 hover:bg-white/60 transition-colors">
                    <div class="text-[#475569] w-9 flex justify-center text-lg shrink-0"><i class="fa-solid fa-headphones-simple"></i></div>
                    <span class="link-text">4 Skill</span>
                </a>
                <a href="grammar.html" class="flex items-center gap-3 p-3 rounded-2xl font-bold text-gray-700 hover:bg-white/60 transition-colors">
                    <div class="text-[#475569] w-9 flex justify-center text-xl font-extrabold font-serif">A⁺</div>
                    Grammar
                </a>
                <a href="exams.html" class="flex items-center gap-3 p-3 rounded-2xl font-bold text-gray-700 hover:bg-white/60 transition-colors">
                    <div class="text-[#475569] w-9 flex justify-center text-lg"><i class="fa-solid fa-clipboard-list"></i></div>
                    Luyện đề
                </a>
            </div>

            <div class="mt-auto flex flex-col">
                <div class="px-4 pb-4">
                    <button id="btn-toggle-sidebar" class="w-full bg-[#dbeafe] hover:bg-[#bfdbfe] text-[#1e3a8a] font-bold py-2.5 rounded-2xl transition-colors shadow-sm flex justify-center items-center">
                        <i id="sidebar-icon" class="fa-solid fa-angles-left text-lg"></i>
                    </button>                
                <div class="flex items-center gap-3 md:gap-4">
            
            <button id="btn-darkmode" class="w-9 h-9 rounded-full bg-white/60 flex items-center justify-center text-gray-600 shadow-sm hover:bg-white transition-colors">
            </button>
            </div>
                <div class="bg-[#bde0fe] px-4 py-3 flex justify-between items-center text-[15px] font-bold text-[#1e3a8a] footer-info">
                    <div class="flex items-center gap-2 bg-[#eef2f6] px-3 py-1.5 rounded-full shadow-sm">
                        <div class="w-[18px] h-[18px] rounded-full border-[1.5px] border-[#3b82f6] flex items-center justify-center">
                            <i class="fa-solid fa-c text-[10px] text-[#3b82f6]"></i>
                        </div>
                        <span></span>
                    </div>
                    <div id="btn-darkmode" class="flex items-center gap-1.5 cursor-pointer hover:opacity-80">
                        <i id="mode-icon" class="fa-regular fa-moon"></i> <span id="mode-text">Tối</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 md:p-8">
            <div class="max-w-6xl mx-auto">
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white rounded-2xl p-4 border-2 border-blue-100 flex items-center gap-4 shadow-sm">
                        <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500 text-xl border border-blue-200">
                            <i class="fa-solid fa-mobile-screen"></i>
                        </div>
                        <div>
                            <div class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Tổng</div>
                            <div id="stat-total-vocab" class="text-2xl font-extrabold text-gray-800">0</div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-4 border-2 border-green-100 flex items-center gap-4 shadow-sm">
                        <div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center text-green-500 text-xl border border-green-200">
                            <i class="fa-solid fa-check-double"></i>
                        </div>
                        <div>
                            <div class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Thuộc (Cấp 1-8)</div>
                            <div id="stat-learned-vocab" class="text-2xl font-extrabold text-gray-800">0</div>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-4 border-2 border-orange-100 flex items-center gap-4 shadow-sm">
                        <div class="w-12 h-12 rounded-xl bg-orange-50 flex items-center justify-center text-orange-500 text-xl border border-orange-200">
                            <i class="fa-regular fa-circle-pause"></i>
                        </div>
                        <div>
                            <div class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Chưa (Cấp 0)</div>
                            <div id="stat-unlearned-vocab" class="text-2xl font-extrabold text-gray-800">0</div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-2xl p-4 border-2 border-pink-100 flex items-center gap-4 shadow-sm">
                        <div class="w-12 h-12 rounded-xl bg-pink-50 flex items-center justify-center text-pink-500 text-xl border border-pink-200">
                            <i class="fa-solid fa-percent"></i>
                        </div>
                        <div>
                            <div class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Tỷ lệ thuộc</div>
                            <div id="stat-percent-vocab" class="text-2xl font-extrabold text-gray-800">0%</div>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row gap-4 mb-6">
                    <div class="flex-1 flex gap-2">
                        <div class="relative flex-1">
                            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="search-all-vocab" placeholder="Tìm từ..." class="w-full pl-11 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-300 font-semibold text-sm shadow-sm" onkeyup="filterAllVocabList()">
                        </div>
                        <select id="filter-srs-level" class="px-4 py-2 bg-white border border-gray-200 rounded-xl font-bold text-sm text-gray-700 outline-none shadow-sm" onchange="filterAllVocabList()">
                            <option value="all">Tất cả</option>
                            <option value="0">Chưa thuộc (Cấp 0)</option>
                            <option value="1">Thuộc (Cấp 1)</option>
                            <option value="2">Thuộc (Cấp 2)</option>
                            <option value="3">Thuộc (Cấp 3)</option>
                            <option value="4">Thuộc (Cấp 4)</option>
                            <option value="5">Thuộc (Cấp 5)</option>
                            <option value="6">Thuộc (Cấp 6)</option>
                            <option value="7">Thuộc (Cấp 7)</option>
                            <option value="8">Thuộc (Cấp 8)</option>
                        </select>
                    </div>
                    <div class="flex gap-2">
                        <button class="bg-[#22c55e] hover:bg-green-600 text-white px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 shadow-md transition-all">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> Thêm từ với AI
                        </button>
                        <button onclick="window.location.href='vocab-sets.html'" class="bg-white hover:bg-gray-50 text-gray-800 border border-gray-200 px-4 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 shadow-sm transition-all">
                            <i class="fa-solid fa-plus"></i> Đến Bộ Từ
                        </button>
                    </div>
                </div>

                <div class="bg-white border-2 border-[#bde0fe] rounded-[32px] overflow-x-auto shadow-sm">
                    <table class="w-full text-left border-collapse min-w-[900px]">
                        <thead>
                            <tr class="bg-[#f0f7ff] border-b border-[#bde0fe]">
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#1e3a8a] uppercase tracking-wider w-[15%]">Thuật ngữ</th>
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#1e3a8a] uppercase tracking-wider w-[20%]">Định nghĩa</th>
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#1e3a8a] uppercase tracking-wider w-[10%]">Phát âm</th>
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#1e3a8a] uppercase tracking-wider w-[10%]">Loại từ</th>
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#1e3a8a] uppercase tracking-wider w-[18%]">Ví dụ</th>
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#1e3a8a] uppercase tracking-wider w-[15%]">Từ đồng nghĩa</th>
                                <th class="px-5 py-4 text-[12px] font-extrabold text-[#1e3a8a] uppercase tracking-wider w-[12%] text-center">Mức độ</th>
                            </tr>
                        </thead>
                        <tbody id="all-vocab-list">
                            </tbody>
                    </table>
                </div>

            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
