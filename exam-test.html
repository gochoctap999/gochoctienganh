<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện đề | Ngọc Trân Digital Legacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#fdfafb] font-[Nunito] min-h-screen">
    
    <header class="flex items-center justify-between px-6 py-3 bg-white shadow-sm sticky top-0 z-50 border-b border-[#ffe4e6]">
        <button onclick="handleExitExam()" class="font-bold text-[#475569] hover:text-[#ff6b81] transition-colors">
            <i class="fa-solid fa-arrow-left mr-1"></i> Thoát
        </button>
        
        <div id="exam-test-progress" class="font-extrabold text-[#ff6b81] bg-[#fff0f3] px-4 py-1.5 rounded-full text-sm border border-[#ffe4e6]">
            0/0 câu
        </div>
        
        <button id="submit-exam-btn" onclick="submitExamTest()" class="bg-[#ff9eb5] text-white px-6 py-1.5 rounded-full font-bold shadow-sm hover:bg-[#ff6b81] transition-all">
            Nộp bài
        </button>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 flex flex-col lg:flex-row gap-8 items-start justify-center">
        
        <div id="exam-left-panel" class="w-full max-w-4xl">
            
            <div id="exam-result-board" class="hidden bg-gradient-to-br from-[#ffb3c6] to-[#ffe5ec] rounded-3xl p-8 mb-8 border-4 border-white shadow-md text-center">
                <h2 class="text-3xl font-extrabold text-[#2d3748] mb-2">Hoàn thành bài luyện!</h2>
                <div class="text-6xl font-extrabold text-white my-4" id="exam-final-score">0/0</div>
                <div class="flex justify-center gap-3 text-sm font-bold">
                    <span class="bg-white/90 px-4 py-2 rounded-xl text-green-600" id="stat-correct">Đúng: 0</span>
                    <span class="bg-white/90 px-4 py-2 rounded-xl text-red-600" id="stat-incorrect">Sai: 0</span>
                </div>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-sm border border-[#ffe4e6]">
                <div id="exam-question-list" class="space-y-8">
                    </div>
            </div>
        </div>

        <aside id="exam-right-panel" class="w-full lg:w-[280px] lg:sticky lg:top-24">
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-[#ffe4e6]">
                <h4 class="text-xs font-bold text-[#ffb3c6] mb-4 uppercase tracking-wider">Danh sách câu hỏi</h4>
                <div id="exam-nav-grid" class="flex flex-wrap gap-2">
                    </div>
            </div>
        </aside>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
    <script>
        // Khởi tạo bài thi khi trang được load
        window.onload = () => {
            if (typeof initExamTest === 'function') {
                initExamTest();
            }
        };

        function handleExitExam() {
            if(confirm('Bạn có chắc muốn thoát? Kết quả hiện tại sẽ không được lưu.')) {
                window.location.href = 'exams.html';
            }
        }
    </script>
</body>
</html>
